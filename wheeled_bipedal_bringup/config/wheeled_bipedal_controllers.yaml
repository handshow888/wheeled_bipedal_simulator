controller_manager:
  ros__parameters:
    robot_description_topic: /robot_description
    update_rate: 500

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    imu_sensor_broadcaster:
      type: imu_sensor_broadcaster/IMUSensorBroadcaster

    # diff_drive_controller:
    #   type: diff_drive_controller/DiffDriveController

    # effort_controller:
    #   type: effort_controllers/JointGroupEffortController

    wheeled_bipedal_controller:
      type: wheeled_bipedal_controller/WheeledBipedalController

gazebo_ros2_control:
  ros__parameters:
    # 必须为每一个使用 position 或 velocity 接口的关节提供 PID
    pid_gains:
      position:
        LF_hip_joint:
          kp: 10.0
          ki: 0.1
          kd: 1.0
        LR_hip_joint:
          kp: 10.0
          ki: 0.1
          kd: 1.0
        RF_hip_joint:
          kp: 10.0
          ki: 0.1
          kd: 1.0
        RR_hip_joint:
          kp: 10.0
          ki: 0.1
          kd: 1.0

imu_sensor_broadcaster:
  ros__parameters:
    sensor_name: "imu_sensor"
    frame_id: "imu_link"

effort_controller:
  ros__parameters:
    joints:
      - LF_hip_joint
      - LR_hip_joint
      - RF_hip_joint
      - RR_hip_joint
      - left_wheel_joint
      - right_wheel_joint

wheeled_bipedal_controller:
  ros__parameters:
    # 左前电机, 左后电机, 右前电机, 右后电机, 左轮, 右轮
    joints:
      [
        "LF_hip_joint",
        "LR_hip_joint",
        "RF_hip_joint",
        "RR_hip_joint",
        "left_wheel_joint",
        "right_wheel_joint",
      ]
    joints_bias_values: [0.4314, 2.6247, 0.4043, 2.6011] # upper_link关节电机state position和tf的偏差值 bias = tf - state
    command_interface_type: "effort" # "position", "velocity", "effort"
    imu_name: "imu_sensor"
    rod_lengths: [0.150, 0.250, 0.250, 0.150, 0.107992374] # L1 - L5
    wheel_radius: 0.069
    wheel_separation: 0.445
    leg_length_min: 0.15
    leg_length_max: 0.37
    # LQR的K矩阵拟合多项式的系数（从低次项系数到高次项系数排序）
    K11poly: [-6.4061, -33.6694, 26.4093, -36.1399]
    K12poly: [-0.2727, -2.8227, -12.1988, 5.8956]
    K13poly: [-0.1057, -0.6820, 2.1080, -2.2011]
    K14poly: [-4.0265, -8.1690, 31.0579, -35.8799]
    K15poly: [11.3612, -90.1801, 254.1186, -252.0758]
    K16poly: [11.3476, -80.8467, 226.7105, -224.8851]
    K21poly: [12.5481, -87.7550, 250.3304, -249.2646]
    K22poly: [0.8654, -4.6582, 14.9359, -15.3124]
    K23poly: [0.3721, -2.5567, 7.0337, -6.8686]
    K24poly: [11.3245, -81.7885, 230.5230, -228.2966]
    K25poly: [19.6817, 39.3812, -125.4799, 133.3164]
    K26poly: [17.6302, 42.9450, -133.9321, 140.7530]

    debug: true # 是否在每次update时获取动态参数

    # PID 参数
    # 左腿
    left:
      leg_length_P: 1250.0
      leg_length_I: 1000.0
      leg_length_D: 125.0
      leg_length: 0.20 # 初始腿长
    # 右腿
    right:
      same_with_left: true # true表示与左腿采用相同参数
      leg_length_P: 1250.0
      leg_length_I: 1000.0
      leg_length_D: 125.0
      leg_length: 0.20 # 初始腿长
    # 左右两腿 phi0 角度差pid控制器
    delta_phi0_P: 500.0
    delta_phi0_I: 100.0
    delta_phi0_D: 4.0
    # 角速度PID
    angular_vel_P: 2.5
    angular_vel_I: 6.0
    angular_vel_D: 0.0001

diff_drive_controller:
  ros__parameters:
    left_wheel_names: ["left_wheel_joint"]
    right_wheel_names: ["right_wheel_joint"]

    wheel_radius: 0.069
    wheel_separation: 0.445

    odom_frame_id: "odom"
    base_frame_id: "base_footprint"

    pose_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
    twist_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]

    enable_odom_tf: true
    publish_frequency: 50.0

    linear.x.has_velocity_limits: true

    linear.x.max_velocity: 1.0
    linear.x.min_velocity: -1.0

    angular.z.max_velocity: 1.0
    angular.z.min_velocity: -1.0
