controller_manager:
  ros__parameters:
    robot_description_topic: /robot_description
    update_rate: 1000

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    imu_sensor_broadcaster:
      type: imu_sensor_broadcaster/IMUSensorBroadcaster

    # diff_drive_controller:
    #   type: diff_drive_controller/DiffDriveController

    effort_controller:
      type: effort_controllers/JointGroupEffortController

    # wheeled_bipedal_controller:
    #   type: wheeled_bipedal_controller/WheeledBipedalController

imu_sensor_broadcaster:
  ros__parameters:
    sensor_name: "imu_sensor"
    frame_id: "imu_link"

effort_controller:
  ros__parameters:
    joints:
      - RR_hip_joint
      - LR_hip_joint
      - RF_hip_joint
      - LF_hip_joint
      - left_wheel_joint
      - right_wheel_joint

wheeled_bipedal_controller:
  ros__parameters:
    # 左前电机, 左后电机, 右前电机, 右后电机, 左轮, 右轮
    joints:
      [
        "LF_hip_joint",
        "LR_hip_joint",
        "RF_hip_joint",
        "RR_hip_joint",
        "left_wheel_joint",
        "right_wheel_joint",
      ]
    joints_bias_values: [1.6577, 1.6037, 1.5967, 1.5497] # upper_link关节电机state position和tf的偏差值 bias = tf - state
    command_interface_type: "effort" # "position", "velocity", "effort"
    joint_command_limit: 5.0
    imu_name: "imu_sensor"
    rod_lengths: [0.150, 0.250, 0.250, 0.150, 0.107992374] # L1 - L5
    wheel_radius: 0.069
    wheel_separation: 0.445
    wheel_mass: 0.85254
    leg_length_min: 0.20
    leg_length_max: 0.37
    # LQR的K矩阵拟合多项式的系数（从低次项系数到高次项系数排序）
    K11poly: [0.0]
    K12poly: [0.0]
    K13poly: [0.0]
    K14poly: [0.0]
    K15poly: [0.0]
    K16poly: [0.0]
    K21poly: [0.0]
    K22poly: [0.0]
    K23poly: [0.0]
    K24poly: [0.0]
    K25poly: [0.0]
    K26poly: [0.0]

    debug: true # 是否在每次update时获取动态参数

    # PID 参数
    # 左腿
    left:
      leg_length_P: 0.0
      leg_length_I: 0.0
      leg_length_D: 0.0
      leg_length: 0.25 # 初始腿长
    # 右腿
    right:
      same_with_left: false # true表示与左腿采用相同参数
      leg_length_P: 0.0
      leg_length_I: 0.0
      leg_length_D: 0.0
      leg_length: 0.25 # 初始腿长
    # 腿长PID前馈值
    leg_length_feedforward: 0.0
    # 左右两腿 phi0 角度差pid控制器
    delta_phi0_P: 0.0
    delta_phi0_I: 0.0
    delta_phi0_D: 0.0
    # 角速度PID
    angular_vel_P: 0.0
    angular_vel_I: 0.0
    angular_vel_D: 0.0

    roll_error_P: 0.0
    roll_error_I: 0.0
    roll_error_D: 0.0

