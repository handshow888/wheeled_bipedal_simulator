controller_manager:
  ros__parameters:
    robot_description_topic: /robot_description
    update_rate: 500

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    imu_sensor_broadcaster:
      type: imu_sensor_broadcaster/IMUSensorBroadcaster

    # diff_drive_controller:
    #   type: diff_drive_controller/DiffDriveController

    # effort_controller:
    #   type: effort_controllers/JointGroupEffortController

    wheeled_bipedal_controller:
      type: wheeled_bipedal_controller/WheeledBipedalController

gazebo_ros2_control:
  ros__parameters:
    # 必须为每一个使用 position 或 velocity 接口的关节提供 PID
    pid_gains:
      position:
        LF_hip_joint:
          kp: 10.0
          ki: 0.1
          kd: 1.0
        LR_hip_joint:
          kp: 10.0
          ki: 0.1
          kd: 1.0
        RF_hip_joint:
          kp: 10.0
          ki: 0.1
          kd: 1.0
        RR_hip_joint:
          kp: 10.0
          ki: 0.1
          kd: 1.0

imu_sensor_broadcaster:
  ros__parameters:
    sensor_name: "imu_sensor"
    frame_id: "imu_link"

effort_controller:
  ros__parameters:
    joints:
      - LF_hip_joint
      - LR_hip_joint
      - RF_hip_joint
      - RR_hip_joint
      - left_wheel_joint
      - right_wheel_joint

wheeled_bipedal_controller:
  ros__parameters:
    # 左前电机, 左后电机, 右前电机, 右后电机, 左轮, 右轮
    joints:
      [
        "LF_hip_joint",
        "LR_hip_joint",
        "RF_hip_joint",
        "RR_hip_joint",
        "left_wheel_joint",
        "right_wheel_joint",
      ]
    joints_bias_values: [0.4314, 2.6247, 0.4043, 2.6011] # upper_link关节电机state position和tf的偏差值 bias = tf - state
    command_interface_type: "effort" # "position", "velocity", "effort"
    imu_name: "imu_sensor"
    rod_lengths: [0.150, 0.250, 0.250, 0.150, 0.107992374] # L1 - L5
    wheel_radius: 0.069
    wheel_separation: 0.445
    leg_length_min: 0.15
    leg_length_max: 0.37
    # LQR的K矩阵拟合多项式的系数（从低次项系数到高次项系数排序）
    K11poly: [-5.5130, -44.4914, 61.4511, -72.9620]
    K12poly: [-1.3350, -3.5557, -0.3025, -10.5771]
    K13poly: [-0.0803, -0.9264, 2.8947, -3.0414]
    K14poly: [-3.3194, -15.2513, 54.2224, -60.8315]
    K15poly: [14.4703, -116.9836, 333.6022, -331.9589]
    K16poly: [14.1179, -104.7849, 297.6572, -296.0990]
    K21poly: [16.0438, -116.1132, 331.8812, -329.8012]
    K22poly: [3.4506, -25.2084, 73.8212, -73.6814]
    K23poly: [0.4361, -3.0873, 8.5681, -8.3829]
    K24poly: [13.2467, -98.0751, 278.4361, -276.2278]
    K25poly: [17.4943, 60.9893, -196.1989, 209.7195]
    K26poly: [15.4757, 64.0118, -202.4285, 214.4254]

    debug: true # 是否在每次update时获取动态参数

    # PID 参数
    # 左腿
    left:
      leg_length_P: 1000.0
      leg_length_I: 0.0
      leg_length_D: 125.0
      leg_length: 0.20 # 初始腿长
    # 右腿
    right:
      same_with_left: true # true表示与左腿采用相同参数
      leg_length_P: 1250.0
      leg_length_I: 1000.0
      leg_length_D: 125.0
      leg_length: 0.20 # 初始腿长
    # 左右两腿 phi0 角度差pid控制器
    delta_phi0_P: 500.0
    delta_phi0_I: 100.0
    delta_phi0_D: 4.0
    # 角速度PID
    angular_vel_P: 2.5
    angular_vel_I: 6.0
    angular_vel_D: 0.0001

    roll_error_P: 0.0
    roll_error_I: 10.0
    roll_error_D: 0.0001

diff_drive_controller:
  ros__parameters:
    left_wheel_names: ["left_wheel_joint"]
    right_wheel_names: ["right_wheel_joint"]

    wheel_radius: 0.069
    wheel_separation: 0.445

    odom_frame_id: "odom"
    base_frame_id: "base_footprint"

    pose_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
    twist_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]

    enable_odom_tf: true
    publish_frequency: 50.0

    linear.x.has_velocity_limits: true

    linear.x.max_velocity: 1.0
    linear.x.min_velocity: -1.0

    angular.z.max_velocity: 1.0
    angular.z.min_velocity: -1.0
